name: Reusable Terraform Network Workflow

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # ----------------------------------------------------
      # Checkout
      # ----------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # Setup Terraform
      # ----------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ----------------------------------------------------
      # DEBUG: Verify secrets are visible to environment
      # ----------------------------------------------------
      - name: Debug Azure secrets visibility
        if: inputs.cloud == 'azure'
        run: |
          echo "AZURE_CLIENT_ID present: ${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "AZURE_TENANT_ID present: ${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "AZURE_SUBSCRIPTION_ID present: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"
          echo "GitHub Environment: ${{ inputs.environment }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"

      # ----------------------------------------------------
      # Azure Login using OIDC
      # ----------------------------------------------------
      - name: Azure Login (OIDC)
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          auth-type: OIDC
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------------------------------
      # Export ARM variables for Terraform
      # ----------------------------------------------------
      - name: Export Azure vars for Terraform
        if: inputs.cloud == 'azure'
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # ----------------------------------------------------
      # AWS Login using OIDC
      # ----------------------------------------------------
      - name: AWS Login (OIDC)
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ----------------------------------------------------
      # Terraform Init
      # ----------------------------------------------------
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ inputs.cloud == 'azure' && 'Azure' || 'AWS' }}

      # ----------------------------------------------------
      # Terraform Apply
      # ----------------------------------------------------
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var-file=envs/${{ inputs.environment }}.tfvars
        working-directory: ${{ inputs.cloud == 'azure' && 'Azure' || 'AWS' }}
