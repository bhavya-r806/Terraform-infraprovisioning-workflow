name: Deploy Network

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      cloud:
        type: choice
        options: [aws]
        default: aws
      environment:
        type: choice
        options: [dev]
        default: dev
      action:
        description: "Terraform action"
        type: choice
        options: [destroy]
        default: destroy

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      cloud: aws
      environment: dev
      action: ${{ github.event.inputs.action || 'destroy' }}
